spring.application.name=OnlineBookStoreRestfullApi


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# ================= JWT CONFIG =================


jwt.key=${JWT_KEY}
jwt.issuer=online-book-store
access.ttl.seconds=900
refresh.ttl.seconds=604800
jwt.cookie.name=refreshToken
jwt.cookie.secure=false
jwt.cookie.http.only=true
jwt.cookie.same.site=lax
jwt.cookie.domain=localhost


spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB


# here is google cloudinary configuration
cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

CLOUDINARY_URL=cloudinary://<your_api_key>:<your_api_secret>@dypxgh3ut

